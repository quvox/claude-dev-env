[global]
    workgroup = WORKGROUP
    server string = Claude Dev Workspace
    security = user
    map to guest = never
    log level = 1
    log file = /var/log/samba/%m.log
    max log size = 50

    # パフォーマンス
    socket options = TCP_NODELAY IPTOS_LOWDELAY
    read raw = yes
    write raw = yes

    # macOS 互換性
    vfs objects = fruit streams_xattr
    fruit:metadata = stream
    fruit:model = MacSamba

[workspace]
    path = /workspace
    browseable = yes
    writable = yes
    valid users = @samba
    force user = devuser
    force group = devuser
    create mask = 0644
    directory mask = 0755
