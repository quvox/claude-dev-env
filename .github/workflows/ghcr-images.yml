name: Build and push images to GHCR

# コンテナイメージ（claude / claude-vnc / docker-proxy）を GHCR へ毎日・マルチアーキ
# (amd64/arm64) で push する。タグは YYYYMMDDHHmm(JST) と latest。
# 設計: docs/10_ghcr-images.md / 実装仕様: docs/impl/90_ghcr-workflow.md
on:
  schedule:
    - cron: '30 18 * * *'   # 03:30 JST 毎日（UTC 18:30）
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-images
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  # --- タグ(YYYYMMDDHHmm, JST) と小文字オーナー名を算出し後続で一貫利用 ---
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      owner: ${{ steps.meta.outputs.owner }}
    steps:
      - id: meta
        run: |
          echo "tag=$(TZ=Asia/Tokyo date +%Y%m%d%H%M)" >> "$GITHUB_OUTPUT"
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

  # --- 3 イメージ × 2 アーキをネイティブ runner で並行ビルドし push-by-digest ---
  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        image:
          - { name: claude,        dockerfile: .devcontainer/Dockerfile.claude,        target: base }
          - { name: claude-vnc,    dockerfile: .devcontainer/Dockerfile.claude,        target: vnc }
          - { name: docker-proxy,  dockerfile: .devcontainer/Dockerfile.docker-proxy,  target: "" }
        platform:
          - { arch: amd64, runner: ubuntu-latest,     docker: linux/amd64 }
          - { arch: arm64, runner: ubuntu-24.04-arm,  docker: linux/arm64 }
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          target: ${{ matrix.image.target }}
          platforms: ${{ matrix.platform.docker }}
          # 特定ユーザーに紐づけない generic user で焼く（UID/GID は実行時に entrypoint が
          # /workspace 所有者へ追従。docs/10_ghcr-images.md「pull して使う運用」）。
          # docker-proxy はこれらの ARG を宣言しないため無視される（警告のみ）。
          build-args: |
            USERNAME=dev
            USER_UID=1000
            USER_GID=1000
          provenance: false
          outputs: type=image,name=${{ env.REGISTRY }}/${{ needs.prepare.outputs.owner }}/claude-dev-${{ matrix.image.name }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.image.name }}-${{ matrix.platform.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}-${{ matrix.platform.arch }}

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.image.name }}-${{ matrix.platform.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # --- 各イメージの amd64/arm64 ダイジェストを manifest list に統合しタグ付け push ---
  merge:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image_name: [claude, claude-vnc, docker-proxy]
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ matrix.image_name }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest list
        working-directory: ${{ runner.temp }}/digests
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ needs.prepare.outputs.owner }}/claude-dev-${{ matrix.image_name }}"
          docker buildx imagetools create \
            -t "${IMAGE}:${{ needs.prepare.outputs.tag }}" \
            -t "${IMAGE}:latest" \
            $(printf "${IMAGE}@sha256:%s " *)

      - name: Inspect
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ needs.prepare.outputs.owner }}/claude-dev-${{ matrix.image_name }}"
          docker buildx imagetools inspect "${IMAGE}:${{ needs.prepare.outputs.tag }}"
