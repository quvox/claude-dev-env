# =============================================================================
# tmux 設定 - Claude Code 開発環境用
# =============================================================================
# 方針: 通常のターミナルとの操作感の差を最小限にする
# プレフィックスキー: Ctrl-B（デフォルト）
# =============================================================================

# --- 基本設定 ---
set -g default-shell /bin/zsh
set -g default-command /bin/zsh
set -g history-limit 50000
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"

# マウスは無効（通常のターミナルと同じコピペ操作を維持）
set -g mouse off

# ESC キーの遅延をなくす（vim 等で快適に）
set -sg escape-time 0

# --- ウィンドウ ---
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- ステータスバー（最小限）---
set -g status-style bg=colour235,fg=colour248
set -g status-left '#[fg=colour46,bold][#S] '
set -g status-right '#[fg=colour244]%H:%M '
set -g status-left-length 30
setw -g window-status-current-style fg=colour220,bold

# --- セッション永続化 ---
set -g detach-on-destroy off
